<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stage Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#eef2f7; }

.card { display:inline-block; padding:15px; margin:10px; background:white; border-radius:10px; box-shadow:0 3px 8px rgba(0,0,0,0.1); }

table { border-collapse: collapse; width:100%; background:white; margin-top:20px;}
th { background:#123d8a; color:white; padding:10px;}
td { padding:8px; border-bottom:1px solid #ddd;}

</style>

</head>
<body>

<h1>Stage Dashboard</h1>

<input type="file" id="file">
<button onclick="run()">Generate</button>

<div id="summary"></div>

<canvas id="chart" style="max-width:800px;"></canvas>

<div id="table"></div>

<script>

function hasValue(v){
  return v !== undefined && v !== null && v !== "";
}

function getSet(data, stage){
  let set = new Set();
  data.forEach(r=>{
    if(hasValue(r[stage])){
      set.add(r["Development code"]);
    }
  });
  return set;
}

function analyze(data, from, to){

  let fromSet = getSet(data, from);
  let toSet = getSet(data, to);

  let active=[], drop=[], newArr=[];

  fromSet.forEach(x=>{
    if(toSet.has(x)) active.push(x);
    else drop.push(x);
  });

  toSet.forEach(x=>{
    if(!fromSet.has(x)) newArr.push(x);
  });

  return {
    active, drop, new:newArr
  };
}

function run(){

  const file = document.getElementById("file").files[0];
  if(!file){ alert("choose file"); return; }

  const reader = new FileReader();

  reader.onload = function(e){

    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data,{type:'array'});

    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws);

    // ===== SUMMARY =====
    let lr2 = getSet(json,"LR2").size;
    let flc = getSet(json,"FLC").size;
    let sms = getSet(json,"SMS").size;
    let cfm = getSet(json,"CFM").size;

    document.getElementById("summary").innerHTML = `
      <div class="card">LR2: ${lr2}</div>
      <div class="card">FLC: ${flc}</div>
      <div class="card">SMS: ${sms}</div>
      <div class="card">CFM: ${cfm}</div>
    `;

    // ===== TRANSITION =====
    let t1 = analyze(json,"LR2","FLC");
    let t2 = analyze(json,"FLC","SMS");
    let t3 = analyze(json,"SMS","CFM");

    // ===== CHART =====
    new Chart(document.getElementById("chart"),{
      type:'bar',
      data:{
        labels:["LR2→FLC","FLC→SMS","SMS→CFM"],
        datasets:[
          {label:"Active", data:[t1.active.length,t2.active.length,t3.active.length], backgroundColor:"green"},
          {label:"Drop", data:[t1.drop.length,t2.drop.length,t3.drop.length], backgroundColor:"red"},
          {label:"New", data:[t1.new.length,t2.new.length,t3.new.length], backgroundColor:"blue"}
        ]
      }
    });

    // ===== TABLE SAMPLE =====
    let html="<table><tr><th>Code</th><th>Type</th></tr>";

    t1.drop.slice(0,20).forEach(x=>{
      html+=`<tr><td>${x}</td><td>Drop LR2→FLC</td></tr>`;
    });

    t1.new.slice(0,20).forEach(x=>{
      html+=`<tr><td>${x}</td><td>New LR2→FLC</td></tr>`;
    });

    html+="</table>";

    document.getElementById("table").innerHTML = html;

  };

  reader.readAsArrayBuffer(file);
}

</script>

</body>
</html>
